{% extends 'base.html' %}

{% block title %}{{ post.title }}{% endblock %}

{% block content %}
<div class="post-container">
    <div class="post-card">
        <h1>{{ post.title }}</h1>
        <div class="post-meta">
            <span>👤 Author: {{ post.author.username }}</span>
        </div>
        <div class="post-content">
            <p>{{ post.content }}</p>
        </div>
        <div class="post-actions">
            <a href="{{ url_for('user_dashboard', username=post.author.username) }}" class="btn btn-back">← Back to Dashboard</a>
        </div>
    </div>
</div>

<style>
    .post-container {
        max-width: 800px;
        margin: 50px auto;
        padding: 20px;
    }
    .post-card {
        background: white;
        border: 1px solid #ddd;
        border-radius: 10px;
        padding: 40px;
        box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }
    .post-card h1 {
        color: #333;
        margin-bottom: 15px;
        border-bottom: 3px solid #007bff;
        padding-bottom: 15px;
    }
    .post-meta {
        color: #888;
        font-size: 14px;
        margin-bottom: 30px;
    }
    .post-meta span {
        margin-right: 20px;
    }
    .post-content {
        line-height: 1.8;
        color: #555;
        font-size: 16px;
        margin-bottom: 30px;
    }
    .post-content p {
        margin-bottom: 15px;
    }
    .post-actions {
        margin-top: 30px;
        padding-top: 20px;
        border-top: 1px solid #eee;
    }
    .btn {
        padding: 12px 25px;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        font-size: 14px;
        text-decoration: none;
        display: inline-block;
        transition: all 0.3s ease;
    }
    .btn-back {
        background-color: #6c757d;
        color: white;
    }
    .btn-back:hover {
        background-color: #545b62;
    }
</style>
{% endblock %}
