<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}My Website{% endblock %}</title>
    <style>
        .flashes {
            list-style: none;
            padding: 0;
            margin: 20px auto;
            max-width: 600px;
        }
        .flashes li {
            padding: 15px 20px;
            margin-bottom: 10px;
            border-radius: 5px;
            font-weight: 500;
        }
        .flashes li.success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .flashes li.danger {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        .flashes li.warning {
            background-color: #fff3cd;
            color: #856404;
            border: 1px solid #ffeeba;
        }
        .flashes li.info {
            background-color: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }
    </style>
</head>
<body>
    <main>
        <!-- Flash Messages - Displayed at the top -->
        {% with messages = get_flashed_messages(with_categories=True) %}
          {% if messages %}
            <ul class="flashes">
              {% for category, message in messages %}
                <li class="{{ category }}">{{ message }}</li>
              {% endfor %}
            </ul>
          {% endif %}
        {% endwith %}
        
        {% block content %}
        <h2>Home</h2>
        <p>This is the home page.</p>
        {% endblock %}
    </main>
</body>
</html>
